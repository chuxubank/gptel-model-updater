name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version: [29-4, 30-1]
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}
      - name: Install dependencies
        run: make install-deps
      - name: Lint
        run: make lint

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version: [29-4, 30-1]
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}
      - name: Install dependencies
        run: make install-deps
      - name: Byte compile
        run: make build

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version: [29-4, 30-1]
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}
      - name: Install dependencies
        run: make install-deps
      - name: Test
        run: make test
